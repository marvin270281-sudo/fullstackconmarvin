<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FullStack Conectados F5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            text-align: center;
            max-width: 900px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .menu-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: none;
            font-size: 1em;
            font-weight: 600;
        }

        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .menu-item.estudios {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .menu-item.java {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .menu-item.juego {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .menu-item.creador {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .menu-item.cards {
            background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
        }

        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 FullStack Conectados F5</h1>
        <p class="subtitle">Plataforma de Aprendizaje Colaborativa</p>
        
        <div class="menu">
            <a href="./estudios/index.html" class="menu-item estudios">📚 Estudios</a>
            <a href="./javaestudo/javaestudo.html" class="menu-item java">☕ Java Estudio</a>
            <a href="./juego/juego.html" class="menu-item juego">🎮 Juego</a>
            <a href="./creador.html" class="menu-item creador">✏️ Creador</a>
            <a href="./cards.html" class="menu-item cards">🎴 Cards</a>
        </div>

        <footer>
            <p>Desarrollado con ❤️ por Marcus Vinícius y colaboradores</p>
        </footer>
    </div>
</body>
</html>
